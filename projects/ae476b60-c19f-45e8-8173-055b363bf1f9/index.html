<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harbor Oak Restaurant</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>
  <header class="hero" id="hero">
    <div class="hero-overlay">
      <h1 class="hero-title">Harbor Oak</h1>
      <p class="hero-subtitle">Casual family dining with fresh, locally sourced flavors</p>
      <button class="btn-primary" id="reserveBtn" aria-label="Reserve a table">Reserve a Table</button>
    </div>
  </header>

  <main>
    <section class="menu-section" id="menuSection" aria-labelledby="menuHeading">
      <h2 id="menuHeading" class="section-title">Our Menu</h2>
      <div class="menu-container" id="menuContainer"></div>
      <div class="menu-controls" id="menuControls" hidden>
        <button class="btn-ghost" id="prevMenu" aria-label="Previous menu item">&#9664;</button>
        <button class="btn-ghost" id="nextMenu" aria-label="Next menu item">&#9654;</button>
      </div>
    </section>

    <section class="gallery-section" id="gallerySection" aria-labelledby="galleryHeading">
      <h2 id="galleryHeading" class="section-title">Instagram Feed</h2>
      <div class="gallery-strip" id="galleryStrip"></div>
    </section>

    <section class="reservation-section" id="reservationSection" aria-labelledby="reservationHeading">
      <h2 id="reservationHeading" class="section-title">Reserve a Table</h2>
      <form id="reservationForm" novalidate>
        <div class="form-group">
          <label for="resName">Name</label>
          <input type="text" id="resName" name="name" required>
        </div>
        <div class="form-group">
          <label for="resPhone">Phone</label>
          <input type="tel" id="resPhone" name="phone" required>
        </div>
        <div class="form-group">
          <label for="resDate">Date</label>
          <input type="date" id="resDate" name="date" required>
        </div>
        <div class="form-group">
          <label for="resTime">Time</label>
          <input type="time" id="resTime" name="time" required>
        </div>
        <div class="form-group">
          <label for="resParty">Party Size</label>
          <input type="number" id="resParty" name="party" min="1" max="20" required>
        </div>
        <button type="submit" class="btn-primary">Submit</button>
      </form>
    </section>
  </main>

  <footer class="site-footer" id="footer">
    <div class="map-container" id="mapContainer">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.83543450812!2d144.96305781531732!3d-37.81410797975186!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d43f8e1f223%3A0x5045675218ce6e0!2sMelbourne%20VIC%2C%20Australia!5e0!3m2!1sen!2sus!4v1690000000000" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" aria-label="Restaurant location on map"></iframe>
    </div>
    <div class="newsletter">
      <h3>Stay Updated</h3>
      <form id="newsletterForm" novalidate>
        <input type="email" id="newsletterEmail" placeholder="Your email" required aria-label="Email address">
        <button type="submit" class="btn-primary">Subscribe</button>
      </form>
      <p id="newsletterMessage" class="message" aria-live="polite"></p>
    </div>
    <p class="footer-note">© 2024 Harbor Oak. All rights reserved.</p>
  </footer>

  <div id="lightbox" class="lightbox" hidden aria-modal="true" role="dialog">
    <button class="lightbox-close btn-ghost" aria-label="Close gallery">&times;</button>
    <img src="" alt="" class="lightbox-img" id="lightboxImg">
    <button class="lightbox-prev btn-ghost" aria-label="Previous image">&#9664;</button>
    <button class="lightbox-next btn-ghost" aria-label="Next image">&#9654;</button>
  </div>

  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <script src="js/utils.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/form.js"></script>
  <script src="js/map.js"></script>
  <script src="js/newsletter.js"></script>
</body>
</html>
