<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITN Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <div class="app-container">
    <main class="calculator-card" aria-label="Calculator">
      <header class="calc-header">
        <div class="calc-logo">DIGITN AI</div>
        <button id="history-toggle" class="btn-icon" aria-label="Toggle History">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </header>

      <section class="display-section" aria-live="polite">
        <div id="prev-operation" class="prev-operation"></div>
        <div class="main-display">
          <span id="current-input" class="current-input">0</span>
        </div>
        <div class="display-actions">
          <button id="copy-btn" class="btn-ghost btn-sm" title="Copy result">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>Copy</span>
          </button>
        </div>
      </section>

      <section class="keypad">
        <button class="btn-functional" data-action="clear" aria-label="Clear">AC</button>
        <button class="btn-functional" data-action="toggle-sign" aria-label="Toggle Positive/Negative">+/-</button>
        <button class="btn-functional" data-action="percent" aria-label="Percentage">%</button>
        <button class="btn-operator" data-operator="/" aria-label="Divide">÷</button>

        <button class="btn-number" data-value="7">7</button>
        <button class="btn-number" data-value="8">8</button>
        <button class="btn-number" data-value="9">9</button>
        <button class="btn-operator" data-operator="*" aria-label="Multiply">×</button>

        <button class="btn-number" data-value="4">4</button>
        <button class="btn-number" data-value="5">5</button>
        <button class="btn-number" data-value="6">6</button>
        <button class="btn-operator" data-operator="-" aria-label="Subtract">−</button>

        <button class="btn-number" data-value="1">1</button>
        <button class="btn-number" data-value="2">2</button>
        <button class="btn-number" data-value="3">3</button>
        <button class="btn-operator" data-operator="+" aria-label="Add">+</button>

        <button class="btn-number span-two" data-value="0">0</button>
        <button class="btn-number" data-value=".">.</button>
        <button class="btn-primary" data-action="calculate" aria-label="Equals">=</button>
      </section>
    </main>

    <aside id="history-panel" class="history-panel hidden" aria-label="Calculation History">
      <div class="history-header">
        <h2>History</h2>
        <button id="clear-history" class="btn-ghost btn-sm">Clear</button>
      </div>
      <ul id="history-list" class="history-list">
        <!-- History items will be injected here -->
      </ul>
      <div id="no-history" class="empty-state">No history yet</div>
    </aside>
  </div>

  <div id="toast" class="toast" aria-live="assertive"></div>

  <!-- Scripts: Dependency order matters (Global scope) -->
  <script src="js/utils.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tests.js"></script> <!-- Manual Console Tests -->
</body>
</html>
