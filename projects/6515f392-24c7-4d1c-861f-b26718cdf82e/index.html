<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Retro-inspired Sake Game">
  <title>Sake Game</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Sake Dash: A Retro Neon Game</h1>
  </header>

  <main>
    <section id="game-container">
      <canvas id="gameCanvas" tabindex="0"></canvas>
    </section>

    <section id="scoreboard">
      <h2>Leaderboard</h2>
      <div id="scores">
        <!-- Scores will go here -->
      </div>
    </section>

    <section id="controls">
      <h2>Game Controls</h2>
      <p>Use the arrow keys to navigate!</p>
    </section>
  </main>

  <footer>
    <p>© 2023 Sake Game by DIGITN AI</p>
  </footer>

  <script src="js/demo-data.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/game.js"></script>
  <script src="js/mechanics.js"></script>
</body>
</html>
