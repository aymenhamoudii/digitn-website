<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="game-container">
    <header class="game-header">
      <h1 class="game-title">Snake</h1>
      <div class="score-display">
        <span class="score-label">Score</span>
        <span class="score-value" id="score">0</span>
      </div>
    </header>
    
    <div class="game-board-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="game-overlay" id="gameOverlay">
        <div class="overlay-content">
          <h2 class="overlay-title">Game Over</h2>
          <p class="final-score">Final Score: <span id="finalScore">0</span></p>
          <button class="restart-btn" id="restartBtn">Play Again</button>
        </div>
      </div>
    </div>
    
    <p class="controls-hint">Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> to control the snake</p>
  </main>
  
  <script src="js/game.js"></script>
</body>
</html>
