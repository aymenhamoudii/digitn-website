<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100" role="img" aria-label="First Time Pizza logo">
  <title>First Time Pizza</title>
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#E85D04"/>
      <stop offset="100%" stop-color="#FFB703"/>
    </linearGradient>
    <style>
      .text{font-family: 'Playfair Display', serif; font-size:28px; fill:#2b2b2b; font-weight:700}
      .tag{font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size:12px; fill:#6b6b6b}
    </style>
  </defs>
  <g transform="translate(12,12)">
    <!-- pizza slice mark -->
    <g transform="translate(0,4)">
      <circle cx="32" cy="32" r="32" fill="url(#g1)" />
      <path d="M32 12 L20 56 A32 32 0 0 0 44 56 Z" fill="#fff" opacity="0.08" />
      <circle cx="36" cy="30" r="4" fill="#8B0000" />
      <circle cx="28" cy="36" r="3" fill="#8B0000" />
      <circle cx="38" cy="40" r="2.5" fill="#8B0000" />
    </g>
    <!-- brand text -->
    <text x="80" y="36" class="text">First Time Pizza</text>
    <text x="80" y="58" class="tag">An elevated neighborhood pizzeria</text>
  </g>
</svg>