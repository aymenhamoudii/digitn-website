<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic-Tac-Toe</h1>
            <p class="subtitle">Classic Game • Modern Design</p>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pvp">
                <span class="icon">👥</span>
                Player vs Player
            </button>
            <button class="mode-btn" data-mode="pvc">
                <span class="icon">🤖</span>
                Player vs Computer
            </button>
        </div>

        <div class="scoreboard">
            <div class="score-card x-score">
                <span class="player-icon">X</span>
                <span class="score-label">Player X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-card draw-score">
                <span class="player-icon">━</span>
                <span class="score-label">Draws</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score-card o-score">
                <span class="player-icon">O</span>
                <span class="score-label">Player O</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>

        <div class="game-status" id="game-status">
            <span class="status-text">X's Turn</span>
        </div>

        <div class="game-board" id="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="restart-btn" id="restart-btn">
            <span class="btn-icon">↺</span>
            New Game
        </button>
    </div>

    <div class="modal" id="winner-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">🏆</div>
            <h2 id="modal-title">Player X Wins!</h2>
            <p id="modal-message">Congratulations!</p>
            <button class="modal-btn" id="modal-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
