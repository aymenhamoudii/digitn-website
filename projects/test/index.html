<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header Section -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 id="greeting" class="text-3xl font-bold text-slate-800 dark:text-white">Good Morning</h1>
                <p id="current-date" class="text-slate-500 dark:text-slate-400">Monday, July 10</p>
            </div>
            <div class="flex items-center space-x-4">
                <div id="clock" class="text-2xl font-mono font-semibold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800 px-4 py-2 rounded-lg shadow-sm">
                    00:00:00
                </div>
                <button id="theme-toggle" class="p-2 rounded-full bg-white dark:bg-slate-800 shadow-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Main Tasks Column -->
            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold text-slate-800 dark:text-white">Tasks</h2>
                        <span id="task-count" class="bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-300 text-xs font-bold px-2.5 py-0.5 rounded-full">0 Active</span>
                    </div>
                    
                    <form id="todo-form" class="flex space-x-2 mb-6">
                        <input type="text" id="todo-input" placeholder="Add a new task..." required
                            class="flex-1 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                            <i class="fas fa-plus mr-2"></i> Add
                        </button>
                    </form>

                    <ul id="todo-list" class="space-y-3">
                        <!-- Tasks will be injected here -->
                    </ul>
                </section>
            </div>

            <!-- Sidebar Column -->
            <div class="space-y-6">
                <!-- Weather Widget (Mock) -->
                <section class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 shadow-lg text-white">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-indigo-100 font-medium">Weather</p>
                            <h3 class="text-4xl font-bold mt-1">24°C</h3>
                            <p class="text-indigo-100">Partly Cloudy</p>
                        </div>
                        <i class="fas fa-cloud-sun text-5xl opacity-80"></i>
                    </div>
                    <div class="mt-6 flex justify-between text-sm text-indigo-100">
                        <span>H: 26°</span>
                        <span>L: 18°</span>
                        <span>Feels like 25°</span>
                    </div>
                </section>

                <!-- Quick Links -->
                <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700">
                    <h2 class="text-lg font-semibold text-slate-800 dark:text-white mb-4">Quick Links</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <a href="https://github.com" target="_blank" class="flex flex-col items-center p-3 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors group">
                            <i class="fab fa-github text-2xl mb-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="text-xs font-medium text-slate-600 dark:text-slate-400">GitHub</span>
                        </a>
                        <a href="https://gmail.com" target="_blank" class="flex flex-col items-center p-3 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors group">
                            <i class="fas fa-envelope text-2xl mb-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="text-xs font-medium text-slate-600 dark:text-slate-400">Gmail</span>
                        </a>
                        <a href="https://calendar.google.com" target="_blank" class="flex flex-col items-center p-3 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors group">
                            <i class="fas fa-calendar-alt text-2xl mb-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="text-xs font-medium text-slate-600 dark:text-slate-400">Calendar</span>
                        </a>
                        <a href="https://stackoverflow.com" target="_blank" class="flex flex-col items-center p-3 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors group">
                            <i class="fab fa-stack-overflow text-2xl mb-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="text-xs font-medium text-slate-600 dark:text-slate-400">StackOverflow</span>
                        </a>
                    </div>
                </section>

                <!-- Daily Quote -->
                <section class="italic text-center p-4">
                    <p id="quote" class="text-slate-500 dark:text-slate-400 text-sm">"The only way to do great work is to love what you do."</p>
                    <p id="quote-author" class="text-slate-400 dark:text-slate-500 text-xs mt-2">— Steve Jobs</p>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
