<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <meta name="description" content="A classic snake game with organic-playful aesthetics">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Recursive:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="game-header">
            <h1 class="game-title">Snake</h1>
            <div class="score-container">
                <div class="score-box">
                    <span class="score-label">Score</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
                <div class="score-box high-score">
                    <span class="score-label">Best</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="game-frame">
                <canvas 
                    id="gameCanvas" 
                    width="400" 
                    height="400"
                    aria-label="Snake game board"
                    role="img"
                ></canvas>
                
                <div class="game-overlay" id="startOverlay" aria-hidden="false">
                    <div class="overlay-content">
                        <h2 class="overlay-title">Ready to Play?</h2>
                        <p class="overlay-text">Use arrow keys or WASD to move</p>
                        <button class="btn btn-primary" id="startBtn" aria-label="Start game">
                            Start Game
                        </button>
                    </div>
                </div>

                <div class="game-overlay hidden" id="pauseOverlay" aria-hidden="true">
                    <div class="overlay-content">
                        <h2 class="overlay-title">Paused</h2>
                        <button class="btn btn-primary" id="resumeBtn" aria-label="Resume game">
                            Resume
                        </button>
                    </div>
                </div>

                <div class="game-overlay hidden" id="gameOverOverlay" aria-hidden="true">
                    <div class="overlay-content">
                        <h2 class="overlay-title">Game Over!</h2>
                        <p class="final-score">Final Score: <span id="finalScore">0</span></p>
                        <button class="btn btn-primary" id="restartBtn" aria-label="Play again">
                            Play Again
                        </button>
                    </div>
                </div>
            </div>

            <div class="mobile-controls" aria-label="Mobile touch controls">
                <button class="control-btn up" id="btnUp" aria-label="Move up">↑</button>
                <div class="control-row">
                    <button class="control-btn left" id="btnLeft" aria-label="Move left">←</button>
                    <button class="control-btn down" id="btnDown" aria-label="Move down">↓</button>
                    <button class="control-btn right" id="btnRight" aria-label="Move right">→</button>
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <button class="btn btn-ghost" id="pauseBtn" aria-label="Pause game">Pause</button>
            <button class="btn btn-ghost" id="soundBtn" aria-label="Toggle sound">Sound: On</button>
        </footer>
    </div>

    <script src="js/game.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
