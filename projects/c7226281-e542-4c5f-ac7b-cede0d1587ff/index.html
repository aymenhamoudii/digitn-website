<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talking Tom Game 🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header class="header">
      <h1>Talking Tom 🐱</h1>
      <div class="stats">
        <div class="friendship-meter">
          <span class="label">Friendship</span>
          <div class="meter-track">
            <div class="meter-fill" id="friendship-bar"></div>
          </div>
          <span class="level" id="friendship-level">Level 1</span>
        </div>
      </div>
    </header>

    <main class="game-area">
      <div class="tom-container" id="tom">
        <!-- Tom the Cat - CSS drawn -->
        <div class="tom">
          <!-- Ears -->
          <div class="ear ear-left">
            <div class="ear-inner"></div>
          </div>
          <div class="ear ear-right">
            <div class="ear-inner"></div>
          </div>
          
          <!-- Head -->
          <div class="head" id="head-zone">
            <div class="face">
              <!-- Eyes -->
              <div class="eyes">
                <div class="eye eye-left" id="eye-left">
                  <div class="pupil">
                    <div class="highlight"></div>
                  </div>
                </div>
                <div class="eye eye-right" id="eye-right">
                  <div class="pupil">
                    <div class="highlight"></div>
                  </div>
                </div>
              </div>
              
              <!-- Nose -->
              <div class="nose" id="nose-zone"></div>
              
              <!-- Mouth -->
              <div class="mouth">
                <div class="mouth-left" id="mouth-left"></div>
                <div class="mouth-right" id="mouth-right"></div>
              </div>
              
              <!-- Whiskers -->
              <div class="whiskers">
                <div class="whisker whisker-left-1"></div>
                <div class="whisker whisker-left-2"></div>
                <div class="whisker whisker-left-3"></div>
                <div class="whisker whisker-right-1"></div>
                <div class="whisker whisker-right-2"></div>
                <div class="whisker whisker-right-3"></div>
              </div>
              
              <!-- Cheeks -->
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
            </div>
            
            <!-- Chin zone -->
            <div class="chin-zone" id="chin-zone"></div>
          </div>
          
          <!-- Body -->
          <div class="body">
            <div class="belly" id="belly-zone">
              <div class="belly-spots">
                <div class="spot"></div>
                <div class="spot"></div>
                <div class="spot"></div>
                <div class="spot"></div>
                <div class="spot"></div>
              </div>
            </div>
            
            <!-- Paws -->
            <div class="paws">
              <div class="paw paw-left" id="paw-left">
                <div class="toe"></div>
                <div class="toe"></div>
                <div class="toe"></div>
              </div>
              <div class="paw paw-right" id="paw-right">
                <div class="toe"></div>
                <div class="toe"></div>
                <div class="toe"></div>
              </div>
            </div>
          </div>
          
          <!-- Tail -->
          <div class="tail" id="tail-zone">
            <div class="tail-segments">
              <div class="segment"></div>
              <div class="segment"></div>
              <div class="segment"></div>
            </div>
          </div>
        </div>
        
        <!-- Interaction feedback -->
        <div class="hearts" id="hearts"></div>
        <div class="sparkles" id="sparkles"></div>
      </div>
      
      <!-- Interaction hints -->
      <div class="hints">
        <div class="hint" data-zone="head">Click head to pet 👋</div>
        <div class="hint" data-zone="belly">Click belly for rubs 👋</div>
        <div class="hint" data-zone="paw">Play with paws 👋</div>
        <div class="hint" data-zone="tail">Swish tail 👋</div>
        <div class="hint" data-zone="chin">Chin scratches 👋</div>
      </div>
    </main>
    
    <!-- Sound toggle -->
    <button class="sound-toggle" id="sound-toggle" aria-label="Toggle sound">
      <svg class="sound-on" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg class="sound-off" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
