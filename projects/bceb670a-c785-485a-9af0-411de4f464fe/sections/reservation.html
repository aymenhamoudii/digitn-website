<section id="reservation" class="p-8">
    <h2 class="text-2xl font-bold">Make a Reservation</h2>
    <form id="reservationForm" class="mt-4">
        <div class="mb-4">
            <label for="name" class="block">Name</label>
            <input type="text" id="name" class="border p-2 w-full" required>
        </div>
        <div class="mb-4">
            <label for="date" class="block">Date</label>
            <input type="date" id="date" class="border p-2 w-full" required>
        </div>
        <div class="mb-4">
            <label for="time" class="block">Time</label>
            <input type="time" id="time" class="border p-2 w-full" required>
        </div>
        <div class="mb-4">
            <label for="guests" class="block">Number of Guests</label>
            <input type="number" id="guests" class="border p-2 w-full" required min="1">
        </div>
        <button type="submit" class="bg-red-600 text-white py-2 px-4 rounded">Reserve</button>
    </form>
</section>
