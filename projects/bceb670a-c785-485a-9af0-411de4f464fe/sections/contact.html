<section id="contact" class="p-8">
    <h2 class="text-2xl font-bold">Contact Us</h2>
    <form id="contactForm" class="mt-4">
        <div class="mb-4">
            <label for="email" class="block">Email</label>
            <input type="email" id="email" class="border p-2 w-full" required>
        </div>
        <div class="mb-4">
            <label for="message" class="block">Your Message</label>
            <textarea id="message" class="border p-2 w-full" rows="4" required></textarea>
        </div>
        <button type="submit" class="bg-red-600 text-white py-2 px-4 rounded">Send Message</button>
    </form>
</section>
