<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Modern</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="resetBtn">Restart Game</button>
        </div>

        <div class="scores">
            <div class="score-box">
                <span class="score-label">Player X</span>
                <span id="scoreX" class="score-value">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">Draws</span>
                <span id="scoreDraw" class="score-value">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">Player O</span>
                <span id="scoreO" class="score-value">0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
