version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: digitn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digitn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env  # Store secrets (SECRET_KEY, DATABASE_URL, etc.) in .env file
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://postgres:postgres@db:5432/digitn
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env file}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data: